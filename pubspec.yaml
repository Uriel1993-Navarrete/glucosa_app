name: glucosa_app
description: Control de glucosa e insulina para diabéticos
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  file_picker: ^10.0.0
  fl_chart: ^0.66.2
  intl: ^0.19.0
  uuid: ^4.3.3
  supabase_flutter: ^2.9.0
  connectivity_plus: ^6.1.1
  table_calendar: ^3.1.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  flutter_timezone: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
